name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    - name: Install CMake
      uses: jwlawson/actions-setup-cmake@v2
    - name: Configure
      run: cmake -S . -B build
    - name: Build
      run: cmake --build build --config Release
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cs2-external-artifacts
        path: |
          build/**/CS2_Core.exe
          build/**/SteamOverlay_Render.dll